<!DOCTYPE html>
<html lang="de" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DEWIT – Notizen</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container py-4" style="max-width: 1000px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="display-6 fw-bold mb-0 text-primary">DEWIT</h1>
      <button class="btn btn-outline-secondary rounded-circle" onclick="toggleDark()">
        <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
      </button>
    </div>

    <div class="row g-4">
      
      <div class="col-lg-4">
        
        <div class="card shadow-sm mb-4 border-0">
          <div class="card-header bg-body-tertiary fw-semibold border-0">Neue Notiz</div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label small text-muted">Inhalt</label>
              <textarea id="text" class="form-control" rows="3" placeholder="Was gibt's zu tun?"></textarea>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-7">
                <label class="form-label small text-muted">Datum</label>
                <input type="date" id="date" class="form-control" />
              </div>
              <div class="col-5">
                <label class="form-label small text-muted">Priorität</label>
                <select id="priority" class="form-select">
                  <option value="important">Wichtig</option>
                  <option value="medium">Mittel</option>
                  <option value="low">Egal</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary w-100" onclick="addNote()">
              <i class="bi bi-plus-lg"></i> Speichern
            </button>
          </div>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-header bg-body-tertiary fw-semibold border-0 d-flex justify-content-between">
            <span>Kalender</span>
            <span id="monthYear" class="text-primary small"></span>
          </div>
          <div class="card-body p-3">
            <div class="calendar-grid" id="calendar"></div>
          </div>
        </div>

      </div>

      <div class="col-lg-8">
        
        <div class="card shadow-sm mb-4 border-0">
          <div class="card-body p-2">
            <div class="row g-2 align-items-center">
              <div class="col-md-8">
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                  <input type="text" id="search" class="form-control border-start-0 ps-0" placeholder="Notizen durchsuchen..." oninput="renderNotes()">
                </div>
              </div>
              <div class="col-md-4">
                <select id="filter" class="form-select" onchange="renderNotes()">
                  <option value="all">Alle anzeigen</option>
                  <option value="open">Nur Offene</option>
                  <option value="done">Erledigte</option>
                  <option value="important">Wichtig</option>
                  <option value="medium">Mittel</option>
                  <option value="low">Egal</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div id="notes" class="d-grid gap-3"></div>
        
        <div id="emptyState" class="text-center text-muted py-5 d-none">
          <i class="bi bi-journal-x display-1 opacity-25"></i>
          <p class="mt-3">Keine Notizen gefunden.</p>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
