version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dewit-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dewit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: dewit-backend
    environment:
      PORT: 3001
      DB_USER: postgres
      DB_HOST: postgres
      DB_NAME: dewit
      DB_PASSWORD: postgres
      DB_PORT: 5432
      JWT_SECRET: dewit-dev-secret-change-in-production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: npm start

volumes:
  postgres_data:
