<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEWIT – Notizen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h1>DEWIT</h1>
      <div style="display: flex; gap: 10px; align-items: center;">
        <span id="userDisplay" style="font-weight: 600; color: var(--muted); font-size: 14px;"></span>
        <button class="secondary" onclick="toggleDark()">🌙</button>
        <button class="secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="myDaySection" class="my-day-section">
      <div class="my-day-header">
        <h2>Mein Tag</h2>
        <span id="myDayCount" class="day-counter">0 Notizen</span>
      </div>
      <div id="myDayContainer" class="my-day-container">
      </div>
      <div id="myDayEmpty" class="my-day-empty">
        <p>Keine Notizen für heute. Zeit, deinen Tag zu starten!</p>
      </div>
    </div>

    <div class="note-form">
      <h3>Neue Notiz</h3>
      <textarea id="text" placeholder="Notiz schreiben..."></textarea>
      <input type="date" id="date" />
      <select id="priority">
        <option value="important">Wichtig</option>
        <option value="medium">Mittel</option>
        <option value="low">Egal</option>
      </select>
      <button onclick="addNote()">Speichern</button>
    </div>

    <div class="note-form filter-bar">
      <input type="text" id="search" placeholder="🔍 Notizen durchsuchen..." oninput="renderNotes()">
      <select id="filter" onchange="renderNotes()">
        <option value="all">Alle</option>
        <option value="open">Offen</option>
        <option value="done">Erledigt</option>
        <option value="important">Wichtig</option>
        <option value="medium">Mittel</option>
        <option value="low">Egal</option>
      </select>
    </div>

    <div class="calendar">
      <h3 id="monthYear"></h3>
      <div class="calendar-grid" id="calendar"></div>
    </div>

    <div id="notes"></div>
  </div>

  <script src="script-api.js"></script>
</body>
</html>
